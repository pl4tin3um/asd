<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanji Academy Pro - Selector</title>
    <style>
        :root {
            --bg-dark: #0b1120;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --accent: #10b981;
            --error: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', "Yu Gothic", sans-serif;
            margin: 0;
            background: #111;
            color: white;
            text-align: center;
            min-height: 100vh;
        }

        /* Temas */
        body.thematic {
            background-image: url('src/backgroundKanaStu.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header {
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #565656;
            border-bottom: 3px solid #6f6f6f;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header.light { background-color: #b9b9b9; border-bottom: 3px solid #000; color: #000; }
        header.thematic { background: rgba(255, 255, 255, 0.3); color: #222; border-bottom: 3px solid #393939; }

        /* Contenedor principal */
        main {
            width: 100%;
            padding: 0; /* Sin espacio para que pegue arriba */
        }

        .container {
            width: 100%;
            max-width: 100%; /* Ocupa todo el ancho */
            padding: 10px 20px;
            box-sizing: border-box;
        }

        /* Navegación pegada arriba */
        .nav-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            padding: 15px 0;
            background: rgba(0,0,0,0.2); /* Sutil separación */
        }

        .tab-btn {
            background: #1e293b;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        /* Botones de acción */
        .action-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-small {
            background: rgb(1, 14, 128);
            color: #ffffff;
            border: 2px solid #4235b6;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Tarjetas de Kanji Compactas */
        .grid-groups {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 100px;
        }

        .group-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            width: fit-content; /* Solo el espacio necesario */
            min-width: 150px;
        }

        .group-card.selected { background: #1e3a8a; border-color: var(--primary); }

        .kanji-mini-grid { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
        
        .mini-char {
            background: rgba(0,0,0,0.3);
            width: 50px;
            height: 65px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .footer-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        .btn-study {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
        }

        .menu-btn { position: absolute; left: 20px; z-index: 1100; }
        .menu-btn img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; }
        .settings-btn { position: absolute; right: 20px; cursor: pointer; font-size: 24px; z-index: 2100; }
        .settings-panel button {width: 100%; padding: 10px; margin-top: 5px; background: #333; border: none; color: white; cursor: pointer;}
        body.thematic .settings-panel button {background: rgba(255, 255, 255, 0.3); color: #222; border: 1px solid #393939;}
        
        .settings-panel {
            position: fixed; right: -300px; top: 0; width: 250px; height: 100%;
            background: #1e293b; padding: 20px; transition: 0.4s; z-index: 2000;
            border-left: 2px solid var(--border);
        }
        .settings-panel.open { right: 0; }

        body.thematic .settings-panel {
        background-image: url('src/thematicRightSidebar.png');
        background-size: cover;
        border-left: 5px solid #111;
    }

        .screen { display: none; }
        .active-screen { display: block; }

        .game-container { margin-top: 50px; background: var(--card-bg); padding: 40px; border-radius: 20px; display: inline-block; }
        .kanji-display { font-size: 100px; color: var(--primary); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="menu-btn">
        <img src="src/miku.png" alt="Inicio">
    </a>
    <h1><span class="title">Kana Study</span></h1>
    <div class="settings-btn" onclick="toggleSettings()">⚙️</div>
    
    <div class="settings-panel" id="settingsPanel">
        <h3>Themes</h3>
        <button onclick="setTheme('light')">Light</button>
        <button onclick="setTheme('dark')">Dark</button>
        <button onclick="setTheme('thematic')">Thematic</button>
        <h3>Language</h3>
        <select id="languageSelect" onchange="setLanguage(this.value)">
            <option value="es">Español</option>
            <option value="en">English</option>
            <option value="ja">にほん</option>
        </select>
    </div>
</header>

<main>
    <div class="container">
        <div id="setup-screen" class="screen active-screen">
            <div class="nav-container" id="category-tabs"></div>

            <div class="action-bar">
                <button class="btn-small" onclick="selectAll(true)">Seleccionar Todo</button>
                <button class="btn-small" onclick="selectAll(false)">Limpiar Todo</button>
            </div>

            <div id="groups-container" class="grid-groups"></div>

            <div class="footer-controls">
                <button class="btn-study" onclick="startStudySession()">ESTUDIAR (<span id="count">0</span>)</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div class="game-container">
                <div id="game-progress" style="margin-bottom: 20px; color: var(--text-dim);"></div>
                <div class="kanji-display" id="current-kanji"></div>
                <div class="kana-hint" id="current-kana"></div>
                <div class="kana-hint" id="current-significado"></div>
                <input type="text" id="answer-input" class="answer-input" placeholder="Escribe el romaji..." autocomplete="off">
                <p id="feedback" style="margin-top: 20px; font-weight: bold;"></p>
                <button class="btn-small" style="margin-top: 30px;" onclick="location.reload()">Volver</button>
            </div>
        </div>
    </div>
</main>

<script src="kanjiStudy.js"></script>
</body>
</html>
