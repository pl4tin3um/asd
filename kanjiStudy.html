<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanji Academy Pro - Selector</title>
    <style>
        :root {
            --bg-dark: #0b1120;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --accent: #10b981;
            --error: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 1200px; }

        .nav-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #1e293b;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .action-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .btn-small {
            background: transparent;
            border: 1px solid var(--text-dim);
            color: var(--text-dim);
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-small:hover { border-color: var(--primary); color: var(--primary); }

        .grid-groups {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 100px;
        }

        .group-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
            border-radius: 12px;
            padding: 18px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .group-card.selected { background: #1e3a8a; border-color: var(--primary); }

        .group-title {
            color: var(--primary);
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
        }

        .kanji-mini-grid { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .mini-char {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            width: 55px;
            height: 70px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        .mini-char b { font-size: 22px; color: var(--text-main); }
        .mini-char span { 
            font-size: 12px; 
            color: var(--primary);
            font-weight: bold;
        }
        
        .group-card.selected .mini-char span { color: white; }

        .footer-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .btn-study {
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px 60px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
            transition: 0.3s;
        }
        .btn-study:hover { transform: scale(1.05); }

        /* PANTALLAS */
        .screen { display: none; }
        .active-screen { display: block; }

        /* UI DE JUEGO SIMPLE */
        .game-container {
            text-align: center;
            margin-top: 50px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        .kanji-display { font-size: 120px; color: var(--primary); margin-bottom: 10px; }
        .kana-hint { font-size: 24px; color: var(--text-dim); margin-bottom: 30px; }
        .answer-input {
            padding: 15px;
            width: 80%;
            font-size: 20px;
            border-radius: 10px;
            border: 2px solid var(--border);
            background: var(--bg-dark);
            color: white;
            text-align: center;
        }
        .menu-btn img {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    transition: 0.3s;
    border: 3px solid #334155;
}

.menu-btn img:hover {
    transform: scale(1.1);
    border-color: #3d5afe;
}
@media screen and (max-width: 480px) {
    
    .menu-btn img {
        width: 45px !important;
        height: 45px !important;
    }
            .grid-groups {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }
}

    </style>
</head>
<body>

    <div class="container">
            <a href="index.html" class="menu-btn">
    <img src="src/miku.png" alt="Inicio">
    </a>

        <div id="setup-screen" class="screen active-screen">
            <header style="text-align:center; margin-bottom: 30px;">
                <h1>Kanjis por Categoría</h1>
                <p style="color:var(--text-dim)">Selecciona los grupos que quieres estudiar hoy</p>
            </header>

            <div class="nav-container" id="category-tabs"></div>

            <div class="action-bar">
                <button class="btn-small" onclick="selectAll(true)">Seleccionar Todo en esta pestaña</button>
                <button class="btn-small" onclick="selectAll(false)">Limpiar Todo</button>
            </div>

            <div id="groups-container" class="grid-groups"></div>

            <div class="footer-controls">
                <button class="btn-study" onclick="startStudySession()">ESTUDIAR SELECCIONADOS (<span id="count">0</span>)</button>
            </div>
        </div>

        <!-- PANTALLA DE JUEGO -->
        <div id="game-screen" class="screen">
            <div class="game-container">
                <div id="game-progress" style="margin-bottom: 20px; color: var(--text-dim);"></div>
                <div class="kanji-display" id="current-kanji"></div>
                <div class="kana-hint" id="current-kana"></div>
                <div class="kana-hint" id="current-significado"></div>
                <input type="text" id="answer-input" class="answer-input" placeholder="Escribe el romaji..." autocomplete="off">
                <p id="feedback" style="margin-top: 20px; font-weight: bold;"></p>
                <button class="btn-small" style="margin-top: 30px;" onclick="location.reload()">Volver al selector</button>
            </div>
        </div>
    </div>

    <script src="kanjiStudy.js"></script>
</body>
</html>
