<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kana Study - Diccionario</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    /* --- ESTILO BASE (IGUAL AL DE ESTUDIO) --- */
    body {
        font-family: 'Segoe UI', sans-serif;
        background: #0f172a; /* Fondo oscuro */
        color: white;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: 0.3s;
    }

    h1 { color: #38bdf8; margin-top: 80px; }
    h2 { color: #94a3b8; font-size: 1.2rem; margin-top: 30px; border-bottom: 1px solid #334155; padding-bottom: 5px; width: 80%; }

    .menu { margin: 20px; display: flex; gap: 10px; }

    /* --- BOTONES --- */
    button {
        padding: 10px 20px;
        border: none;
        background: #334155;
        color: white;
        cursor: pointer;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s;
    }

    button:hover { background: #3d5afe; }
    button.active { background: #3d5afe; box-shadow: 0 0 10px rgba(61, 90, 254, 0.4); }

    /* --- GRID Y CARDS --- */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
        gap: 15px;
        max-width: 900px;
        width: 90%;
        margin: 20px auto;
        padding-bottom: 40px;
    }

    .card {
        background: #1e293b;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        text-align: center;
        border: 1px solid #334155;
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
        border-color: #38bdf8;
    }

    .char {
    font-size: 26px; /* O el tamaño que tengas */
    letter-spacing: 1px;
    white-space: nowrap; 
}

    .romaji {
        font-size: 14px;
        color: #94a3b8;
        font-weight: bold;
    }

    /* --- NAVEGACIÓN Y SETTINGS --- */
    .menu-btn { position: fixed; top: 20px; left: 20px; z-index: 1000; }
    .menu-btn img { width: 65px; height: 65px; border-radius: 50%; transition: 0.3s; border: 3px solid #334155; }
    .menu-btn img:hover { transform: scale(1.1); border-color: #3d5afe; }

    .settings-btn {
        position: fixed; top: 20px; right: 20px; font-size: 24px; padding: 8px;
        background: #000; border-radius: 12px; border: 3px solid #94a3b8;
        cursor: pointer; z-index: 1000; transition: 0.3s;
    }

    .settings-panel {
        position: fixed; right: -350px; top: 0; width: 260px; height: 100%;
        background: #1e293b; padding: 25px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 500; border-left: 1px solid #334155;
    }
    .settings-panel.open { right: 0; box-shadow: -10px 0 50px rgba(0,0,0,0.6); }

    .hidden { display: none !important; }

    /* ================================================================
       SECCIÓN TEMÁTICA (PARA PONER TUS IMÁGENES)
       ================================================================ */

    body.thematic {

        background-image: url('src/backgroundVerCaracteres.jpg');
        background-color: #222; /* Color de respaldo */
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }

    body.thematic .card {
        background: #ffffff; 
        border: 2px solid #000;
    }

    body.thematic .char { color: #000; }
    body.thematic .romaji { color: #555; }
    body.thematic h1, body.thematic h2 { color: #ffffff; text-shadow: 2px 2px 4px #000; }

    body.thematic .settings-panel {
        /* IMAGEN DEL PANEL LATERAL */
        background-image: url('src/thematicRightSidebar.png');
        background-color: #1a1a1a;
        background-size: cover;
    }

</style>
</head>

<body class="light"> <!-- Clase por defecto -->

    <a href="kanastudy.html" class="menu-btn">
        <img src="src/miku.png" alt="Estudio">
    </a>

    <div class="settings-btn" onclick="toggleSettings()">⚙️</div>

    <div class="settings-panel" id="settingsPanel">
        <h3>Themes</h3>
        <button onclick="setTheme('light')">Default Dark</button>
        <button onclick="setTheme('thematic')">Thematic</button>
        
        <h3>Language</h3>
        <select id="languageSelect" onchange="setLanguage(this.value)" style="width: 100%; padding: 8px; border-radius: 5px;">
            <option value="es">Español</option>
            <option value="en">English</option>
            <option value="ja">にほん</option>
        </select>
    </div>

    <h1>Diccionario Kana</h1>

    <div class="menu">
        <button id="btn-hiragana" class="active" onclick="showSection('hiragana')">Hiragana</button>
        <button id="btn-katakana" onclick="showSection('katakana')">Katakana</button>
    </div>

    <!-- SECCIÓN HIRAGANA -->
    <div id="hiragana">
        <h2>Hiragana Básico</h2>
        <div class="grid" id="hiragana-basic"></div>
        <h2>Hiragana Compuesto</h2>
        <div class="grid" id="hiragana-combo"></div>
    </div>

    <!-- SECCIÓN KATAKANA -->
    <div id="katakana" class="hidden">
        <h2>Katakana Básico</h2>
        <div class="grid" id="katakana-basic"></div>
        <h2>Katakana Compuesto</h2>
        <div class="grid" id="katakana-combo"></div>
        <h2>Katakana Extendido</h2>
        <div class="grid" id="katakana-extra"></div>
    </div>

    <footer style="margin-top: auto; padding: 20px; color: #475569;">
        <p>Creado por Pl4tin3um</p>
    </footer>

<script>
    // --- LÓGICA DE SECCIONES ---
    function showSection(section) {
        document.getElementById("hiragana").classList.add("hidden");
        document.getElementById("katakana").classList.add("hidden");
        document.getElementById("btn-hiragana").classList.remove("active");
        document.getElementById("btn-katakana").classList.remove("active");

        document.getElementById(section).classList.remove("hidden");
        document.getElementById("btn-" + section).classList.add("active");
    }


const hiraganaBasic = [

    ["た","ta"], ["ち","chi"], ["つ","tsu"], ["て","te"], ["と","to"],
    ["な","na"], ["に","ni"], ["ぬ","nu"], ["ne","ne"], ["の","no"],
    ["は","ha"], ["ひ","hi"], ["ふ","fu"], ["へ","he"], ["ほ","ho"],
    ["ま","ma"], ["み","mi"], ["む","mu"], ["め","me"], ["も","mo"],
    ["や","ya"], ["ゆ","yu"], ["よ","yo"],
    ["ら","ra"], ["り","ri"], ["る","ru"], ["れ","re"], ["ろ","ro"],
    ["わ","wa"], ["を","wo"], ["ん","n"],

    ["が","ga"], ["ぎ","gi"], ["ぐ","gu"], ["げ","ge"], ["ご","go"],
    ["ざ","za"], ["じ","ji"], ["ず","zu"], ["ぜ","ze"], ["ぞ","zo"],
    ["だ","da"], ["ぢ","ji"], ["づ","zu"], ["で","ed"], ["ど","do"],
    ["ば","ba"], ["び","bi"], ["ぶ","bu"], ["べ","be"], ["ぼ","bo"],
    ["ぱ","pa"], ["ぴ","pi"], ["ぷ","pu"], ["ぺ","pe"], ["ぽ","po"]

    ["にゃ","nya"], ["にゅ","nyu"], ["にょ","nyo"],
    ["ひゃ","hya"], ["ひゅ","hyu"], ["ひょ","hyo"],
    ["みゃ","mya"], ["みゅ","myu"], ["みょ","myo"],
    ["りゃ","rya"], ["りゅ","ryu"], ["りょ","ryo"],
    ["ぎゃ","gya"], ["ぎゅ","gyu"], ["ぎょ","gyo"],

    ["びゃ","bya"], ["びゅ","byu"], ["びょ","byo"],
    ["ぴゃ","pya"], ["ぴゅ","pyu"], ["ぴょ","pyo"]

const katakanaBasic = [
    ["ア","a"], ["イ","i"], ["ウ","u"], ["エ","e"], ["オ","o"],
    ["カ","ka"], ["キ","ki"], ["ク","ku"], ["ケ","ke"], ["コ","ko"],
    ["サ","sa"], ["シ","shi"], ["ス","su"], ["セ","se"], ["ソ","so"],
    ["タ","ta"], ["チ","chi"], ["ツ","tsu"], ["テ","te"], ["ト","to"],
    ["ナ","na"], ["ニ","ni"], ["ヌ","nu"], ["ネ","ne"], ["ノ","no"],
    ["ハ","ha"], ["ヒ","hi"], ["フ","fu"], ["ヘ","he"], ["ホ","ho"],
    ["マ","ma"], ["ミ","mi"], ["ム","mu"], ["メ","me"], ["モ","mo"],
    ["ヤ","ya"], ["ユ","yu"], ["ヨ","yo"],
    ["ラ","ra"], ["リ","ri"], ["ル","ru"], ["レ","re"], ["ロ","ro"],
    ["ワ","wa"], ["ヲ","wo"], ["ン","n"],

    ["ガ","ga"], ["ギ","gi"], ["グ","gu"], ["ゲ","ge"], ["ゴ","go"],
    ["ザ","za"], ["ジ","ji"], ["ズ","zu"], ["ゼ","ze"], ["ゾ","zo"],
    ["ダ","da"], ["ヂ","ji"], ["ヅ","zu"], ["デ","de"], ["ド","do"],
    ["バ","ba"], ["ビ","bi"], ["ブ","bu"], ["ベ","be"], ["ボ","bo"],
    ["パ","pa"], ["ピ","pi"], ["プ","pu"], ["ペ","pe"], ["ポ","po"]

    ["キャ","kya"], ["キュ","kyu"], ["キョ","kyo"],

    ["チャ","cha"], ["チュ","chu"], ["チョ","cho"],

    ["ヒャ","hya"], ["ヒュ","hyu"], ["ヒョ","hyo"],
    ["ミャ","mya"], ["ミュ","myu"], ["ミョ","myo"],
    ["リャ","rya"], ["リュ","ryu"], ["リョ","ryo"],
    ["ギャ","gya"], ["ギュ","gyu"], ["ギョ","gyo"],
    ["ジャ","ja"], ["ジュ","ju"], ["ジョ","jo"],

const katakanaExtra = [
    ["ファ","fa"], ["フィ","fi"], ["フェ","fe"], ["フォ","fo"],
    ["ウィ","wi"], ["ウェ","we"], ["ウォ","wo"], ["ヴァ","va"],
    ["ヴィ","vi"], ["ヴェ","ve"], ["ヴォ","vo"], ["シェ","she"],
    ["ジェ","je"], ["チェ","che"], ["ティ","ti"], ["トゥ","tu"],
    ["ディ","di"], ["ドゥ","du"], ["ツァ","tsa"], ["ツェ","tse"], ["ツォ","tso"]
];

    function render(id, data) {
        const container = document.getElementById(id);
        data.forEach(item => {
            const div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `<div class="char">${item[0]}</div><div class="romaji">${item[1]}</div>`;
            container.appendChild(div);
        });
    }

    render("hiragana-basic", hiraganaBasic);
    render("hiragana-combo", hiraganaCombo);
    render("katakana-basic", katakanaBasic);
    render("katakana-combo", katakanaCombo);
    render("katakana-extra", katakanaExtra);

    // --- SETTINGS Y TEMAS ---
    function toggleSettings() { document.getElementById("settingsPanel").classList.toggle("open"); }

    function setTheme(theme) {
        document.body.className = theme;
        localStorage.setItem('selectedTheme', theme);
    }

    document.addEventListener("DOMContentLoaded", () => {
        const savedTheme = localStorage.getItem('selectedTheme') || 'light';
        setTheme(savedTheme);
    });
</script>

</body>
</html>
