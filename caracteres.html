<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kana Study - Compacto Multi-Columna</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    :root {
        --color-bg: #0f172a;
        --color-card-bg: rgba(30, 41, 59, 0.7);
        --color-char: #ffffff;
        --color-romaji: #38bdf8;
        --border-color: #334155;
    }

    body.thematic {
        --color-bg: #222;
        --color-card-bg: rgba(248, 246, 232, 0.95);
        --color-char: #000;
        --color-romaji: #555;
        --border-color: #000;
        background-image: url('src/backgroundVerCaracteres.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }

    body {
        font-family: 'Segoe UI', "Yu Gothic", sans-serif;
        background-color: var(--color-bg);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 5px;
    }

    /* Navegación Fija */
    .menu { 
        display: flex; 
        flex-wrap: wrap; 
        gap: 6px; 
        justify-content: center; 
        padding: 10px 0;
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--color-bg);
        width: 100%;
    }

    button {
        padding: 6px 12px;
        border: none;
        background: #1e293b;
        color: white;
        cursor: pointer;
        border-radius: 12px;
        font-weight: bold;
        font-size: 12px;
        border: 1px solid #334155;
    }

    button.active { 
        background: #3d5afe; 
        border-color: #38bdf8;
    }

    h2 { 
        color: var(--color-romaji); 
        font-size: 1rem; 
        margin: 10px 0; 
        text-align: center;
        width: 100%;
    }

    /* --- CONTENEDOR MULTI-COLUMNA --- */
    .grid-wrapper {
        display: flex;
        flex-wrap: wrap; /* Esto permite que se pongan uno al lado del otro */
        gap: 15px;
        justify-content: center;
        max-width: 1200px;
        width: 100%;
    }

    .group-row {
        display: grid;
        grid-template-columns: repeat(5, 60px); 
        gap: 6px;
        background-color: var(--color-card-bg);
        padding: 8px;
        border-radius: 10px;
        border-left: 4px solid #38bdf8;
        height: fit-content;
    }

    .card {
        background-color: var(--color-card-bg);
        padding: 6px 0;
        border-radius: 6px;
        text-align: center;
        border: 1px solid var(--border-color);
        width: 60px;
        height: 70px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }
    .menu-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1000;
}

.menu-btn img {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    transition: 0.3s;
    border: 3px solid #334155;
}


    .card.empty { visibility: hidden; }

    .char { font-size: 24px; color: var(--color-char); line-height: 1; }
    .romaji { font-size: 10px; color: var(--color-romaji); font-weight: bold; margin-top: 4px; }

    .settings-btn { position: fixed; bottom: 20px; right: 20px; cursor: pointer; z-index: 1000; font-size: 24px; background: #1e293b; border-radius: 50%; padding: 5px; }
    .hidden { display: none !important; }

</style>
</head>
<body>
    <a href="kanastudy.html" class="menu-btn">
    <img src="src/miku.png" alt="Inicio">
    </a>

    <div class="settings-btn" onclick="document.body.classList.toggle('thematic')">🌓</div>

    <div class="menu">
        <button id="btn-h-basic" class="active" onclick="showSection('h-basic')">Hiragana</button>
        <button id="btn-h-combo" onclick="showSection('h-combo')">H-Compuestos</button>
        <button id="btn-k-basic" onclick="showSection('k-basic')">Katakana</button>
        <button id="btn-k-combo" onclick="showSection('k-combo')">K-Compuestos</button>
        <button id="btn-k-extra" onclick="showSection('k-extra')">K-Extras</button>
    </div>

    <!-- SECCIONES -->
    <div id="h-basic" class="section-container">
        <h2>Hiragana Básico</h2>
        <div id="grid-h-basic" class="grid-wrapper"></div>
    </div>

    <div id="h-combo" class="section-container hidden">
        <h2>Hiragana Compuesto</h2>
        <div id="grid-h-combo" class="grid-wrapper"></div>
    </div>

    <div id="k-basic" class="section-container hidden">
        <h2>Katakana Básico</h2>
        <div id="grid-k-basic" class="grid-wrapper"></div>
    </div>

    <div id="k-combo" class="section-container hidden">
        <h2>Katakana Compuesto</h2>
        <div id="grid-k-combo" class="grid-wrapper"></div>
    </div>

    <div id="k-extra" class="section-container hidden">
        <h2>Katakana Extras</h2>
        <div id="grid-k-extra" class="grid-wrapper"></div>
    </div>

    function render(id, list) {
        const container = document.getElementById(id);
        list.forEach(group => {
            const row = document.createElement("div");
            row.className = "group-row";
            row.style.borderLeftColor = group.c;
            group.s.forEach(item => {
                const card = document.createElement("div");
                if (!item[0]) card.className = "card empty";
                else {
                    card.className = "card";
                    card.innerHTML = `<span class="char">${item[0]}</span><span class="romaji">${item[1]}</span>`;
                }
                row.appendChild(card);
            });
            container.appendChild(row);
        });
    }

    function showSection(id) {
        document.querySelectorAll('.section-container').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('btn-' + id).classList.add('active');
    }

    render("grid-h-basic", data.hBasic);
    render("grid-h-combo", data.hCombo);
    render("grid-k-basic", data.kBasic);
    render("grid-k-combo", data.kCombo);
    render("grid-k-extra", data.kExtra);
