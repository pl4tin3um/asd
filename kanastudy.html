<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenador Kana Pro</title>
    <link rel="stylesheet" href="kanastudyCS.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    
  <a href="index.html" class="menu-btn">
    <img src="src/miku.png" alt="Inicio">
    </a>

        <div class="settings-btn" onclick="toggleSettings()">⚙️</div>


    <div class="settings-panel" id="settingsPanel">
        <h3>Themes</h3>
        <button onclick="setTheme('light')">Default</button>
        <button onclick="setTheme('thematic')">Thematic</button>



    <h3>Language</h3>

    <select id="languageSelect" onchange="setLanguage(this.value)">
        <option value="en">English</option>
        <option value="ja">にほん</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="it">Italiano</option>

    </select>
    </div>

<div class="card">



    <div id="menu">        
<div class="selector-tipo">
    <button id="btn-h" class="active" onclick="setTipo('h')">Hiragana</button>
    <button id="btn-k" onclick="setTipo('k')">Katakana</button>
</div>
<div class="selector-tipo">
    <button id="btn-ch" onclick="setTipo('ch')">Compuestos (H)</button>
    <button id="btn-ck" onclick="setTipo('ck')">Compuestos (K)</button>
    <button id="btn-ex" onclick="setTipo('ex')">Extras (K)</button>
</div>

<div class="controles-seleccion">
    <button type="button" class="btn-sm" onclick="seleccionarTodo(true)">Todos</button>
    <button type="button" class="btn-sm" onclick="seleccionarTodo(false)">Ninguno</button>
    <button type="button" class="btn-sm" onclick="location.href='caracteres.html'">Ver caracteres</button>
</div>

<div class="grid-checks">

    <label class="check-item grupo-basico"><input type="checkbox" value="Vocal" checked><span>Vocales</span></label>
    <label class="check-item grupo-basico"><input type="checkbox" value="K" checked><span>か (ka...)</span></label>
    <label class="check-item grupo-basico"><input type="checkbox" value="S" checked><span>さ (sa...)</span></label>
    <label class="check-item grupo-basico"><input type="checkbox" value="T" checked><span>た (ta...)</span></label>
    <label class="check-item grupo-basico"><input type="checkbox" value="N" checked><span>な (na...)</span></label>
    <label class="check-item grupo-basico"><input type="checkbox" value="H" checked><span>は (ha...)</span></label>
    <label class="check-item grupo-basico"><input type="checkbox" value="M" checked><span>ま (ma...)</span></label>
    <label class="check-item grupo-basico"><input type="checkbox" value="Y" checked><span>や (ya...)</span></label>
    <label class="check-item grupo-basico"><input type="checkbox" value="R" checked><span>ら (ra...)</span></label>
    <label class="check-item grupo-basico"><input type="checkbox" value="W/N" checked><span>わ (wa...)</span></label>
    <label class="check-item grupo-basico"><input type="checkbox" value="G" checked><span>が (ga...)</span></label>
    <label class="check-item grupo-basico"><input type="checkbox" value="Z" checked><span>ざ (za...)</span></label>
    <label class="check-item grupo-basico"><input type="checkbox" value="D" checked><span>だ (da...)</span></label>
    <label class="check-item grupo-basico"><input type="checkbox" value="B" checked><span>ば (ba...)</span></label>
    <label class="check-item grupo-basico"><input type="checkbox" value="P" checked><span>ぱ (pa...)</span></label>


    <label class="check-item grupo-compuesto hidden"><input type="checkbox" value="C1" checked><span>きゃ(kya-sha)</span></label>
    <label class="check-item grupo-compuesto hidden"><input type="checkbox" value="C2" checked><span>ちゃ(cha-nya)</span></label>
    <label class="check-item grupo-compuesto hidden"><input type="checkbox" value="C3" checked><span>ひゃ(hya-mya)</span></label>
    <label class="check-item grupo-compuesto hidden"><input type="checkbox" value="C4" checked><span>りゃ(rya-gya)</span></label>
    <label class="check-item grupo-compuesto hidden"><input type="checkbox" value="C5" checked><span>ぎゃ(gya-ja)</span></label>
    <label class="check-item grupo-compuesto hidden"><input type="checkbox" value="C6" checked><span>びゃ(bya-pya)</span></label>


    <label class="check-item grupo-extra hidden"><input type="checkbox" value="E1" checked><span>(F/V)</span></label>
    <label class="check-item grupo-extra hidden"><input type="checkbox" value="E2" checked><span>(Ti/Di)</span></label>
    <label class="check-item grupo-extra hidden"><input type="checkbox" value="E3" checked><span>(She/Je/Che)</span></label>
</div>

        <button class="btn-principal" onclick="iniciarSesion()">Empezar</button>
    </div>


    <div id="juego" class="hidden">
        <div class="header-juego">
            <span id="score">Racha: 0 </span>
            <button class="btn-sm" onclick="volver()">Menú</button>
        </div>
        
        <div id="caracter-visual"></div>
        
        <input type="text" id="respuesta" placeholder="romaji..." autocomplete="off">
        
        <div id="feedback"></div>
    </div>
</div>

<script src="kanastudyJS.js"></script>
</body>
</html>
