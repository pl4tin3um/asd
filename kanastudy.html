<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenador Kana Pro</title>
    <link rel="stylesheet" href="kanastudyCS.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    
  <a href="index.html" class="menu-btn">
    <img src="src/miku.png" alt="Inicio">
    </a>

        <div class="settings-btn" onclick="toggleSettings()">⚙️</div>


    <div class="settings-panel" id="settingsPanel">
        <h3>Themes</h3>
        <button  onclick="setTheme('light')">Default</button>
        <button  onclick="setTheme('thematic')">Thematic</button>
    <h3>Language</h3>

    <select id="languageSelect" onchange="setLanguage(this.value)">
        <option value="en">English</option>
        <option value="ja">にほん</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="it">Italiano</option>

    </select>
    </div>

<div class="card">



<div id="menu">        


    <div class="controles-seleccion">
        <button type="button" class="btn-sm" onclick="seleccionarTodo(true)">Todos</button>
        <button type="button" class="btn-sm" onclick="seleccionarTodo(false)">Ninguno</button>
        <button type="button" class="btn-sm" onclick="location.href='caracteres.html'">Ver Caracteres</button>
    </div>

<div class="grid-checks-container" id="scrollContainer">

    <div id="sec-basicos" class="script-section">
        <h4>Hiragana Básicos</h4>
        <div class="grid-checks">
            <label class="check-item"><input type="checkbox" data-script="h" value="Vocal" checked><span>Vocales</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="K"><span>か (K)</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="S"><span>さ (S)</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="T"><span>た (T)</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="N"><span>な (N)</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="H"><span>は (H)</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="M"><span>ま (M)</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="Y"><span>や (Y)</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="R"><span>ら (R)</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="W/N"><span>わ (W/N)</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="G"><span>が (G)</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="Z"><span>ざ (Z)</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="D"><span>だ (D)</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="B"><span>ば (B)</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="P"><span>ぱ (P)</span></label>
        </div>

        <h4>Katakana Básicos</h4>
        <div class="grid-checks">
            <label class="check-item"><input type="checkbox" data-script="k" value="Vocal"><span>ア (Vocal)</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="K"><span>カ (K)</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="S"><span>サ (S)</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="T"><span>タ (T)</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="N"><span>ナ (N)</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="H"><span>ハ (H)</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="M"><span>マ (M)</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="Y"><span>ヤ (Y)</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="R"><span>ラ (R)</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="W/N"><span>ワ (W/N)</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="G"><span>ガ (G)</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="Z"><span>ザ (Z)</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="D"><span>ダ (D)</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="B"><span>バ (B)</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="P"><span>パ (P)</span></label>
        </div>
    </div>

    <hr>

    <div id="sec-compuestos" class="script-section">
        <h4>Compuestos (Hiragana)</h4>
        <div class="grid-checks">
            <label class="check-item"><input type="checkbox" data-script="h" value="C1"><span>きゃ-しゅ</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="C2"><span>しょ-にゃ</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="C3"><span>にゅ-ひょ</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="C4"><span>みゃ-りゅ</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="C5"><span>りょ-じょ</span></label>
            <label class="check-item"><input type="checkbox" data-script="h" value="C6"><span>びゃ-ぴょ</span></label>
        </div>

        <h4>Compuestos (Katakana)</h4>
        <div class="grid-checks">
            <label class="check-item"><input type="checkbox" data-script="k" value="C1"><span>キャ-シュ</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="C2"><span>ショ-ニャ</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="C3"><span>ニュ-ヒョ</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="C4"><span>ミャ-リョ</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="C5"><span>リョ-ジョ</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="C6"><span>ビャ-ピョ</span></label>
        </div>
    </div>

    <hr>

    <div id="sec-extras" class="script-section">
        <h4>Extras Katakana</h4>
        <div class="grid-checks">
            <label class="check-item"><input type="checkbox" data-script="k" value="E1"><span>F / V</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="E2"><span>Ti / Di / Che</span></label>
            <label class="check-item"><input type="checkbox" data-script="k" value="E3"><span>She / Je / Tsa</span></label>
        </div>
    </div>
</div>

    <button class="btn-principal" onclick="iniciarSesion()">Empezar</button>
</div>


    <div id="juego" class="hidden">
        <div class="header-juego">
            <span id="score">Racha: 0 </span>
            <button class="btn-sm" onclick="volver()">Menú</button>
        </div>
        
        <div id="caracter-visual"></div>
        
        <input type="text" id="respuesta" placeholder="romaji..." autocomplete="off">
        
        <div id="feedback"></div>
    </div>
</div>

<script src="kanastudyJS.js"></script>
</body>
</html>
